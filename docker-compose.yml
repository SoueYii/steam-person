version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: steam
      POSTGRES_USER: steam
      POSTGRES_PASSWORD: steam123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/processed:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steam"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://steam:steam123@postgres:5432/steam
      REDIS_URL: redis://redis:6379/0
      SYNC_DATABASE_URL: postgresql://steam:steam123@postgres:5432/steam
      DUCKDB_PATH: /data/steam_olap.duckdb
      CSV_DIR: /data
      STEAM_API_KEY: ""
    volumes:
      - ./data:/data
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://steam:steam123@postgres:5432/steam
      REDIS_URL: redis://redis:6379/0
      SYNC_DATABASE_URL: postgresql://steam:steam123@postgres:5432/steam
      DUCKDB_PATH: /data/steam_olap.duckdb
      CSV_DIR: /data
      STEAM_API_KEY: ""
    volumes:
      - ./data:/data
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.steam_api worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
